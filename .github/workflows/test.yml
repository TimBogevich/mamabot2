name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci
        working-directory: functions

      - name: Run lint
        run: npm run lint
        working-directory: functions

      - name: Run tests (unit + integration, no emulator)
        run: npx vitest run --exclude 'test/rules/**'
        working-directory: functions

      # Java is pre-installed on ubuntu-latest and emulators:exec auto-manages the
      # Firestore emulator lifecycle (start, env-var export, wait-for-ready, shutdown).
      # No external auth needed — the emulator sets FIRESTORE_EMULATOR_HOST locally.
      - name: Run rules tests + verify users schema (emulator)
        run: npx firebase emulators:exec --only firestore --project mamabot-97d22 "npm run test:rules && npm run verify:users-schema"
        working-directory: functions